basePath: /
definitions:
  models.AllocationStatus:
    enum:
    - ACTIVE
    - INACTIVE
    - DELETED
    type: string
    x-enum-varnames:
    - ACTIVE
    - INACTIVE
    - DELETED
  models.ComputeAllocation:
    properties:
      compute_cluster_id:
        description: The ID of the compute cluster where the allocation is provisioned.
        type: string
      end_time:
        type: string
      id:
        type: string
      initial_su_amount:
        description: SUs allocated at the time of allocation creation.
        type: integer
      name:
        type: string
      project_id:
        type: string
      start_time:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.AllocationStatus'
        description: ACTIVE, INACTIVE, DELETED, etc.
    type: object
  models.ComputeAllocationChangeRequest:
    properties:
      approver_id:
        description: The ID of the user who approved/rejected the change request,
          if applicable.
        type: string
      change_status:
        description: '"PENDING", "APPROVED", "REJECTED", etc.'
        type: string
      compute_allocation_id:
        type: string
      id:
        type: string
      reason:
        description: The reason for the change request, e.g., "Need more SUs for upcoming
          jobs", "Requesting reduction in SUs due to project completion", etc.
        type: string
      requested_status:
        allOf:
        - $ref: '#/definitions/models.AllocationStatus'
        description: ACTIVE, INACTIVE, DELETED, etc.
      requested_su_amount:
        description: The requested allocation amount in SUs, e.g., 1200 SUs, etc.
        type: integer
      requester_id:
        description: The ID of the user who made the change request.
        type: string
      timestamp:
        description: The time when the change request was made.
        type: string
    type: object
  models.ComputeAllocationChangeRequestEvent:
    properties:
      compute_allocation_change_request_id:
        type: string
      description:
        description: Optional description of the event, e.g., "Change request created
          by user", "Change request approved by admin", etc.
        type: string
      event_type:
        description: '"CREATED", "APPROVED", "REJECTED", etc.'
        type: string
      id:
        type: string
      timestamp:
        description: The time when the event occurred.
        type: string
    type: object
  models.ComputeAllocationDiff:
    properties:
      compute_allocation_id:
        type: string
      description:
        description: Optional description of the diff, e.g., "SU usage updated based
          on job completion", "Allocation marked as INACTIVE due to end time reached",
          etc.
        type: string
      diff_type:
        description: '"USAGE_UPDATE", "ALLOCATION_STATUS_CHANGE", etc.'
        type: string
      id:
        type: string
      new_su_amount:
        description: New allocation amount in SUs, e.g., 900 SUs, etc.
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/models.AllocationStatus'
        description: ACTIVE, INACTIVE, DELETED, etc.
      timestamp:
        description: The time when the diff was generated.
        type: string
    type: object
  models.ComputeAllocationMembership:
    properties:
      compute_allocation_id:
        type: string
      end_time:
        type: string
      id:
        type: string
      membership_status:
        allOf:
        - $ref: '#/definitions/models.AllocationStatus'
        description: ACTIVE, INACTIVE, etc.
      start_time:
        type: string
      user_id:
        type: string
    type: object
  models.ComputeAllocationMembershipResourceOverride:
    properties:
      compute_allocation_membership_id:
        type: string
      compute_allocation_resource_id:
        type: string
      id:
        type: string
      override_resource_amount:
        description: The overridden amount of the resource for the user (e.g., number
          of CPUs, GPUs).
        type: integer
      override_resource_time:
        description: The overridden wall-clock time in minutes that the resource amount
          is granted for.
        type: integer
    type: object
  models.ComputeAllocationResource:
    properties:
      compute_cluster_id:
        description: The ID of the compute cluster the resource (partition) belongs
          to.
        type: string
      id:
        type: string
      name:
        description: resource / partition name, e.g., "cpu-01", "gpu-01", "gpu-interactive",
          etc.
        type: string
      resource_amount:
        description: Number of CPUs, GPUs.
        type: integer
      resource_type:
        description: 'TRES: cpu, gres/gpu'
        type: string
    type: object
  models.ComputeAllocationResourceMapping:
    properties:
      compute_allocation_id:
        type: string
      compute_allocation_resource_id:
        type: string
      id:
        type: string
      resource_amount:
        description: Amount of the resource allocated to this allocation (e.g., number
          of CPUs, GPUs).
        type: integer
      resource_time:
        description: Wall-clock time in minutes that the allocated amount is granted
          for.
        type: integer
    type: object
  models.ComputeAllocationResourceRate:
    properties:
      compute_allocation_resource_id:
        type: string
      end_time:
        description: The time when this rate expires.
        type: string
      id:
        type: string
      rate:
        description: The rate for the resource in SUs per unit, e.g., 0.5 SU per CPU
          hour, 2 SU per GPU hour, etc.
        type: number
      start_time:
        description: The time when this rate becomes effective.
        type: string
    type: object
  models.ComputeAllocationUsage:
    properties:
      compute_allocation_id:
        type: string
      compute_allocation_resource_id:
        description: The specific resource consumed, e.g., 20 CPU hours, 10 GPU hours,
          etc.
        type: string
      id:
        type: string
      job_id:
        description: The ID of the job that consumed the allocation.
        type: string
      last_updated:
        description: The last time the usage was updated. SU should be calculated
          up to this point in time and charge rates should be applied based on the
          rates effective at this time.
        type: string
      used_raw_amount:
        description: The raw amount of resource used, e.g., 20 CPU hours, 10 GPU hours,
          etc.
        type: number
      used_su_amount:
        description: SUs used by the allocation, e.g., 200 SUs, etc.
        type: number
      user_id:
        description: The ID of the user who used the allocation.
        type: string
    type: object
  models.ComputeCluster:
    properties:
      id:
        type: string
      name:
        description: A human-readable name for the compute cluster, e.g., "Cluster
          A", "Cluster B", etc.
        type: string
    type: object
  models.ComputeClusterUser:
    properties:
      compute_cluster_id:
        type: string
      id:
        type: string
      local_username:
        description: The username of the user on the compute cluster, which may be
          different from their Airavata Custos username.
        type: string
      user_id:
        type: string
    type: object
  models.Organization:
    properties:
      id:
        type: string
      name:
        type: string
      originated_id:
        description: 'The ID of the organization in origination. For example: ACCESS
          Record ID.'
        type: string
    type: object
  models.PrivilegeKey:
    enum:
    - amie:read
    - amie:write
    - hpc:read
    - hpc:write
    - signer:read
    - signer:write
    - privileges:grant
    - roles:manage
    type: string
    x-enum-varnames:
    - PrivilegeAMIERead
    - PrivilegeAMIEWrite
    - PrivilegeHPCRead
    - PrivilegeHPCWrite
    - PrivilegeSignerRead
    - PrivilegeSignerWrite
    - PrivilegeGrant
    - PrivilegeRolesManage
  models.Project:
    properties:
      created_time:
        type: string
      id:
        type: string
      originated_id:
        description: 'The ID of the project in origination. For example: ACCESS Record
          ID.'
        type: string
      origination:
        description: ACCESS, NAIRR, XRASS, etc.
        type: string
      project_pi_id:
        type: string
      status:
        $ref: '#/definitions/models.ProjectStatus'
      title:
        type: string
    type: object
  models.ProjectStatus:
    enum:
    - ACTIVE
    - INACTIVE
    - DELETED
    type: string
    x-enum-varnames:
    - ProjectActive
    - ProjectInactive
    - ProjectDeleted
  models.Role:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
    type: object
  models.TraceEvent:
    properties:
      created_at:
        type: string
      description:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      event_type:
        type: string
      parent_span_id:
        type: string
      source:
        type: string
      span_id:
        type: string
      status:
        type: string
    type: object
  models.TraceNode:
    properties:
      children:
        items:
          $ref: '#/definitions/models.TraceNode'
        type: array
      created_at:
        type: string
      description:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      event_type:
        type: string
      parent_span_id:
        type: string
      source:
        type: string
      span_id:
        type: string
      status:
        type: string
    type: object
  models.TraceSummary:
    properties:
      ended_at:
        type: string
      event_count:
        type: integer
      root_operation:
        type: string
      source:
        type: string
      started_at:
        type: string
      status:
        type: string
      trace_id:
        type: string
    type: object
  models.User:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      organization_id:
        type: string
      status:
        $ref: '#/definitions/models.UserStatus'
    type: object
  models.UserIdentity:
    properties:
      created_at:
        type: string
      email:
        description: the email configured by the source
        type: string
      external_id:
        description: the source's native identifier
        type: string
      id:
        type: string
      metadata:
        description: JSON-encoded source-specific fields
        type: string
      oidc_sub:
        description: OIDC subject when the source issues one
        type: string
      source:
        description: e.g. access, nairr, cilogon
        type: string
      user_id:
        type: string
    type: object
  models.UserPrivilege:
    properties:
      granted_at:
        type: string
      granted_by:
        type: string
      id:
        type: string
      privilege:
        $ref: '#/definitions/models.PrivilegeKey'
      reason:
        type: string
      user_id:
        type: string
    type: object
  models.UserRole:
    properties:
      granted_at:
        type: string
      granted_by:
        type: string
      reason:
        type: string
      role_id:
        type: string
      user_id:
        type: string
    type: object
  models.UserStatus:
    enum:
    - ACTIVE
    - INACTIVE
    - SUSPENDED
    - MERGED
    type: string
    x-enum-varnames:
    - UserActive
    - UserInactive
    - UserSuspended
    - UserMerged
  server.attachResourceRequest:
    properties:
      compute_allocation_resource_id:
        type: string
      resource_amount:
        type: integer
      resource_time:
        type: integer
    type: object
  server.createRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  server.grantPrivilegeRequest:
    properties:
      privilege:
        $ref: '#/definitions/models.PrivilegeKey'
      reason:
        type: string
    type: object
  server.grantRoleRequest:
    properties:
      reason:
        type: string
      roleID:
        type: string
    type: object
  server.mergeUsersRequest:
    properties:
      retiring_user_id:
        type: string
      surviving_user_id:
        type: string
    type: object
  server.revokePrivilegeRequest:
    properties:
      reason:
        type: string
    type: object
  server.revokeRoleRequest:
    properties:
      reason:
        type: string
    type: object
  server.rolePrivilegeRequest:
    properties:
      privilege:
        $ref: '#/definitions/models.PrivilegeKey'
    type: object
  server.updateAllocationResourceMappingRequest:
    properties:
      resource_amount:
        type: integer
      resource_time:
        type: integer
    type: object
  server.updateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'REST API for Apache Custos: organizations, users, projects, compute
    clusters and allocations, audit traces, and the privilege/role authorization layer.
    Authenticate every request with the X-Custos-User-Id header. Connector endpoints
    (/connectors/<name>/...) are documented in separate specs.'
  title: Apache Custos Core API
  version: 0.2.0
paths:
  /audit/events:
    get:
      parameters:
      - description: 32-char lowercase hex
        in: query
        name: trace_id
        required: true
        type: string
      - description: 16-char lowercase hex
        in: query
        name: span_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              events:
                items:
                  $ref: '#/definitions/models.TraceEvent'
                type: array
            type: object
        "400":
          description: Malformed trace_id or span_id
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Audit trace store not configured
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: List audit events for a trace (optionally one span)
      tags:
      - Audit
  /audit/sources:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              sources:
                items:
                  type: string
                type: array
            type: object
        "503":
          description: Audit trace store not configured
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: List distinct audit-event sources
      tags:
      - Audit
  /audit/traces:
    get:
      description: One row per distinct trace_id. `q` matches trace_id hex prefix
        or root-operation substring.
      parameters:
      - collectionFormat: multi
        description: Restrict to listed sources (repeatable)
        in: query
        items:
          type: string
        name: source
        type: array
      - collectionFormat: multi
        description: ok | error | in_progress (repeatable)
        in: query
        items:
          type: string
        name: status
        type: array
      - description: RFC3339 lower bound on started_at
        in: query
        name: from
        type: string
      - description: RFC3339 upper bound on started_at
        in: query
        name: to
        type: string
      - description: Substring match on trace_id hex or root operation
        in: query
        name: q
        type: string
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              limit:
                type: integer
              offset:
                type: integer
              total:
                type: integer
              traces:
                items:
                  $ref: '#/definitions/models.TraceSummary'
                type: array
            type: object
        "400":
          description: Invalid filter value
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Audit trace store not configured
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: List audit traces with filters
      tags:
      - Audit
  /audit/traces/{trace_id}:
    get:
      parameters:
      - description: 32-char lowercase hex
        in: path
        name: trace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              trace_id:
                type: string
              tree:
                items:
                  $ref: '#/definitions/models.TraceNode'
                type: array
              truncated:
                type: boolean
            type: object
        "400":
          description: Malformed trace_id
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Trace not found
          schema:
            properties:
              error:
                type: string
            type: object
        "503":
          description: Audit trace store not configured
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Get a trace's nested span tree
      tags:
      - Audit
  /compute-allocation-change-request-events:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ComputeAllocationChangeRequestEvent'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequestEvent'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Create a change request event
      tags:
      - Change Request Events
  /compute-allocation-change-request-events/{id}:
    delete:
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Delete a change request event
      tags:
      - Change Request Events
    get:
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequestEvent'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Get a change request event
      tags:
      - Change Request Events
  /compute-allocation-change-requests:
    post:
      consumes:
      - application/json
      parameters:
      - description: Change request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ComputeAllocationChangeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequest'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Create a compute allocation change request
      tags:
      - Compute Allocation Change Requests
  /compute-allocation-change-requests/{id}:
    delete:
      parameters:
      - description: Change request ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Delete a compute allocation change request
      tags:
      - Compute Allocation Change Requests
    get:
      parameters:
      - description: Change request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequest'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Get a compute allocation change request
      tags:
      - Compute Allocation Change Requests
    put:
      consumes:
      - application/json
      parameters:
      - description: Change request ID
        in: path
        name: id
        required: true
        type: string
      - description: Change request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ComputeAllocationChangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequest'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Update a compute allocation change request
      tags:
      - Compute Allocation Change Requests
  /compute-allocation-change-requests/{id}/events:
    get:
      parameters:
      - description: Change request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ComputeAllocationChangeRequestEvent'
            type: array
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: List events for a change request
      tags:
      - Change Request Events
  /compute-allocation-change-requests/{id}/events/latest:
    get:
      parameters:
      - description: Change request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ComputeAllocationChangeRequestEvent'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Get the most recent event for a change request
      tags:
      - Change Request Events
  /compute-allocation-diffs:
    post:
      consumes:
      - application/json
      description: Records a discrete change against a compute allocation (e.g. USAGE_UPDATE
        or ALLOCATION_STATUS_CHANGE).
      parameters:
      - description: Diff payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ComputeAllocationDiff'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ComputeAllocationDiff'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Create a compute allocation diff
      tags:
      - Compute Allocation Diffs
  /compute-allocation-diffs/{id}:
    delete:
      parameters:
      - description: Diff ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Delete a compute allocation diff
      tags:
      - Compute Allocation Diffs
    get:
      parameters:
      - description: Diff ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ComputeAllocationDiff'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - CustosUserHeader: []
      summary: Get a compute allocation diff
      tags:
      - Compute Allocation Diffs
