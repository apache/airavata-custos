core:
  database:
    url: "${DATABASE_DSN}"
  api:
    port: 8080
  log_level: "info"
  auth:
    oidc:
      issuer:   "${OIDC_ISSUER_URL}"
      audience: "${OIDC_AUDIENCE}"
    cache_ttl: "30s"

connectors:
  slurm-mapper:
    type: "slurm-association-mapper"
    enabled: true
    slurm_api:
      url: "https://slurm-api.example.com"
      version: "0.0.38"
      username: "slurm_admin"
      token: "${SLURM_TOKEN}" # Reference to environment variable

  slurm-usage-monitor:
    type: "slurm-usage-monitor"
    enabled: true
    slurm_api:
      url: "https://slurm-api.example.com"
      version: "0.0.38"
      username: "slurm_admin"
      token: "${SLURM_TOKEN}" # Reference to environment variable
    cluster_id: "slurm-cluster"

  comanage-provisioner:
    type: "comanage-identity-provisioner"
    enabled: true
    registry:
      url: "${COMANAGE_REGISTRY_URL}"
      co_id: ${COMANAGE_CO_ID}
      api_user: "${COMANAGE_API_USER}"
      api_key: "${COMANAGE_API_KEY}"
    unix_cluster:
      id: ${COMANAGE_UNIX_CLUSTER_ID}
      person_id_type: "${COMANAGE_PERSON_ID_TYPE}"
    provisioning:
      custos_cluster_id: "${CUSTOS_CLUSTER_ID}"
      default_shell: "/bin/bash"
      homedir_prefix: "/home/"
      http_timeout: "30s"

  amie-processor:
    type: "amie-processor"
    enabled: true
    credentials:
      base_url: "${AMIE_BASE_URL}"
      site_code: "${AMIE_SITE_CODE}"
      api_key: "${AMIE_API_KEY}"
    cluster:
      id: "${AMIE_CLUSTER_ID}"
    polling:
      poll_interval: "30s"
      worker_interval: "5s"
      poller_enabled: true
    timeouts:
      connect_timeout: "5s"
      read_timeout: "20s"

  temp-account:
    type: "temp-account"
    enabled: true

  analytics:
    type: "analytics"
    enabled: true
