core:
  database:
    url: "${DATABASE_DSN}"
  api:
    port: 8080
  log_level: "info"
  auth:
    oidc:
      issuer:   "${OIDC_ISSUER_URL}"
      audience: "${OIDC_AUDIENCE}"
    cache_ttl: "30s"

  # Notification mail; sending stays disabled while any value is unset.
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "${EMAIL_HOST_USER}"
    password: "${EMAIL_HOST_PASSWORD}"
    from: "${EMAIL_HOST_USER}"
    site_name: "${EMAIL_SITE_NAME}"
    portal_url: "${EMAIL_PORTAL_URL}"
    cluster_host: "${EMAIL_CLUSTER_HOST}"

connectors:
  slurm-mapper:
    type: "slurm-association-mapper"
    enabled: true
    slurm_api:
      url: "${SLURM_API_URL}"
      version: "${SLURM_API_VERSION}"
      username: "${SLURM_API_USERNAME}"
      token: "${SLURM_TOKEN}"
    # How often the sweep re-declares associations for provisioned members.
    # This is what guarantees an association exists, so it also decides how
    # long a member waits when an event is lost or the account provisions late.
    association_reconcile_interval: "5m"
    # How long to hold a just-provisioned account back before writing its
    # association. Covers the directory export and the cluster's name cache,
    # which Custos cannot observe. Raise it if users hit "Invalid account"
    # right after being added.
    association_provision_grace: "30s"

  slurm-usage-monitor:
    type: "slurm-usage-monitor"
    enabled: true
    slurm_api:
      url: "${SLURM_API_URL}"
      version: "${SLURM_API_VERSION}"
      username: "${SLURM_API_USERNAME}"
      token: "${SLURM_TOKEN}"
    cluster_id: "${CUSTOS_CLUSTER_ID}"
    # How far back each poll re-scans to catch jobs SLURM writes to its
    # accounting database late. Tune to the cluster's slurmdbd commit lag.
    usage_lookback: "15m"

  comanage-provisioner:
    type: "comanage-identity-provisioner"
    enabled: true
    registry:
      url: "${COMANAGE_REGISTRY_URL}"
      co_id: ${COMANAGE_CO_ID}
      api_user: "${COMANAGE_API_USER}"
      api_key: "${COMANAGE_API_KEY}"
    unix_cluster:
      id: ${COMANAGE_UNIX_CLUSTER_ID}
      person_id_type: "${COMANAGE_PERSON_ID_TYPE}"
    provisioning:
      custos_cluster_id: "${CUSTOS_CLUSTER_ID}"
      default_shell: "/bin/bash"
      homedir_prefix: "/home/"
      http_timeout: "30s"

  amie-processor:
    type: "amie-processor"
    enabled: true
    credentials:
      base_url: "${AMIE_BASE_URL}"
      site_code: "${AMIE_SITE_CODE}"
      api_key: "${AMIE_API_KEY}"
    cluster:
      id: "${AMIE_CLUSTER_ID}"
    polling:
      poll_interval: "30s"
      worker_interval: "5s"
      poller_enabled: true
    timeouts:
      connect_timeout: "5s"
      read_timeout: "20s"

  temp-account:
    type: "temp-account"
    enabled: true

  analytics:
    type: "analytics"
    enabled: true
