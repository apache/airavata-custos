  <rect x="0" y="0" width="1460" height="1346" fill="#f4f3ef"></rect>

  
  <rect x="300" y="176" width="780" height="824" rx="16" fill="#f4f8fd" stroke="#3a63a8" stroke-width="2"></rect>
  <rect x="300" y="1050" width="780" height="280" rx="16" fill="#fafafa" stroke="#8b9098" stroke-width="2"></rect>

  
  <path d="M300,216 V190 Q300,176 314,176 H1066 Q1080,176 1080,190 V216 Z" fill="#e6eef9"></path>
  <line x1="300" y1="216" x2="1080" y2="216" stroke="#3a63a8" stroke-width="1.5"></line>
  <text class="m" x="318" y="201" font-size="12" font-weight="600" fill="#274a86" letter-spacing="0.5">CUSTOS SERVER</text>
  <text x="432" y="201" font-size="12.5" fill="#5b6b86">single Go binary · shared DB handle, event bus, HTTP router &amp; identity context</text>

  
  <path d="M300,1088 V1064 Q300,1050 314,1050 H1066 Q1080,1050 1080,1064 V1088 Z" fill="#eef0f2"></path>
  <line x1="300" y1="1088" x2="1080" y2="1088" stroke="#8b9098" stroke-width="1.5"></line>
  <text class="m" x="352" y="1073" font-size="12" font-weight="600" fill="#4c5159" letter-spacing="0.5">MARIADB</text>
  <text x="424" y="1073" font-size="12.5" fill="#6b7078">single instance · core service owns the core schema · AMIE-Processor owns its own schema</text>

  
  <rect x="332" y="348" width="716" height="200" rx="13" fill="#eaf1fc" stroke="#b3c1da" stroke-width="1.5"></rect>

  
  <text class="m" x="40" y="216" font-size="11" fill="#9a9ea5" letter-spacing="1.3">CLIENTS</text>
  <text class="m" x="1150" y="216" font-size="11" fill="#9a9ea5" letter-spacing="1.3">EXTERNAL SYSTEMS</text>

  
  <rect x="344" y="338" width="192" height="16" rx="5" fill="#eaf1fc"></rect>
  <text class="m" x="350" y="349" font-size="10" fill="#5b6276" letter-spacing="0.9">SERVICE + CONNECTOR HANDLERS</text>
  <text class="m" x="348" y="684" font-size="10" fill="#8a8e95" letter-spacing="0.7">BUS SUBSCRIBERS</text>

  
  <rect x="40" y="232" width="200" height="70" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="53" y="256" font-size="13.5" font-weight="600" fill="#23262c">Science gateway portal</text>
  <text x="53" y="274" font-size="11" fill="#6b6f76">web UI · calls REST / HTTPS</text>

  <rect x="40" y="322" width="200" height="70" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="53" y="346" font-size="13.5" font-weight="600" fill="#23262c">Admin CLI</text>
  <text x="53" y="364" font-size="11" fill="#6b6f76">operator tooling · REST</text>

  <rect x="40" y="412" width="200" height="70" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="53" y="436" font-size="13.5" font-weight="600" fill="#23262c">Other consumers</text>
  <text x="53" y="454" font-size="11" fill="#6b6f76">downstream gateways / services</text>

  <rect x="40" y="520" width="200" height="78" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5" stroke-dasharray="5 4"></rect>
  <text x="53" y="544" font-size="13.5" font-weight="600" fill="#23262c">Extensions</text>
  <text x="53" y="561" font-size="10.5" fill="#6b6f76">SSH cert signer · PAM module</text>
  <text x="53" y="576" font-size="10.5" fill="#6b6f76">separate processes — call via REST</text>

  
  <rect x="332" y="238" width="716" height="76" rx="11" fill="#eef3fb" stroke="#3a63a8" stroke-width="1.5"></rect>
  <text x="347" y="260" font-size="14.5" font-weight="600" fill="#23262c">Identity middleware + HTTP router <tspan font-size="11" font-weight="400" fill="#6b7384">— entry point for every request</tspan></text>
  <text x="347" y="283" font-size="11.5" fill="#5b6b86">verifies JWT against OIDC issuer · resolves caller from <tspan class="m" font-size="10.5" fill="#5b6b86">user_identities</tspan> by <tspan class="m" font-size="10.5" fill="#5b6b86">sub</tspan> · dispatches <tspan class="m" font-size="10.5" fill="#274a86">Public</tspan> / <tspan class="m" font-size="10.5" fill="#274a86">RequireAuth</tspan> /</text>
  <text x="347" y="299" font-size="11.5" fill="#5b6b86"><tspan class="m" font-size="10.5" fill="#274a86">RequirePrivilege</tspan></text>

  
  <rect x="348" y="388" width="288" height="144" rx="11" fill="#fff" stroke="#3a63a8" stroke-width="1.5"></rect>
  <text x="362" y="412" font-size="15" font-weight="600" fill="#23262c">Core service</text>
  <text class="m" x="622" y="412" font-size="10" fill="#274a86" text-anchor="end">pkg/service.Service</text>
  <text x="362" y="433" font-size="11.5" fill="#5b6b86">domain mutations + audit + event publish · owns</text>
  <text x="362" y="449" font-size="11.5" fill="#5b6b86">transactions</text>

  
  <rect x="676" y="388" width="354" height="62" rx="10" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="689" y="408" font-size="13.5" font-weight="600" fill="#23262c">AMIE-Processor</text>
  <rect x="952" y="397" width="65" height="17" rx="8.5" fill="none" stroke="#d8b878"></rect>
  <text class="m" x="984.5" y="409" font-size="9.5" fill="#8a5a17" text-anchor="middle">ACCESS-CI</text>
  <text x="689" y="424" font-size="10.5" fill="#7a6a4a">HTTP routes · AMIE REST client · poller + processor goroutines</text>

  
  <rect x="676" y="466" width="354" height="62" rx="10" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="689" y="486" font-size="13.5" font-weight="600" fill="#23262c">TempAccount</text>
  <text x="689" y="502" font-size="10.5" fill="#7a6a4a">HTTP routes only · no external system, no workers</text>

  
  <rect x="332" y="592" width="716" height="72" rx="11" fill="#e8eefb" stroke="#3a63a8" stroke-width="1.5"></rect>
  <text x="347" y="615" font-size="15" font-weight="600" fill="#23262c">Event bus</text>
  <text class="m" x="1033" y="615" font-size="10.5" fill="#274a86" text-anchor="end">pkg/events.Bus</text>
  <text x="347" y="631" font-size="11.5" fill="#5b6b86">in-process pub/sub · publish happens after the service transaction commits · subscribers run async in their own goroutines</text>

  
  <rect x="348" y="700" width="320" height="80" rx="11" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="361" y="721" font-size="13.5" font-weight="600" fill="#23262c">COmanage Identity-Provisioner</text>
  <text x="361" y="736" font-size="10.5" fill="#7a6a4a">event subscriber · REST client · no own tables</text>

  <rect x="348" y="800" width="320" height="80" rx="11" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="361" y="821" font-size="13.5" font-weight="600" fill="#23262c">SLURM Association-Mapper</text>
  <text x="361" y="836" font-size="10.5" fill="#7a6a4a">event subscriber · SLURM REST client</text>

  <rect x="348" y="900" width="320" height="80" rx="11" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="361" y="921" font-size="13.5" font-weight="600" fill="#23262c">SLURM Usage-Monitor</text>
  <text x="361" y="936" font-size="10.5" fill="#7a6a4a">background poller · SLURM REST client · publishes events from polling</text>

  
  <rect x="1150" y="238" width="270" height="76" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="1163" y="260" font-size="13.5" font-weight="600" fill="#23262c">OIDC issuer</text>
  <text x="1163" y="275" font-size="11" fill="#6b6f76">CILogon / Keycloak · serves JWKS (keys cached)</text>

  <rect x="1150" y="388" width="270" height="76" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="1163" y="410" font-size="13.5" font-weight="600" fill="#23262c">ACCESS-CI AMIE REST API</text>
  <text x="1163" y="425" font-size="11" fill="#6b6f76">cloud-hosted · AMIE-Processor polls it</text>

  <rect x="1150" y="700" width="270" height="80" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="1163" y="722" font-size="13.5" font-weight="600" fill="#23262c">COmanage registry</text>
  <text x="1163" y="737" font-size="11" fill="#6b6f76">CILogon-hosted · REST</text>

  <rect x="1150" y="812" width="270" height="140" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="1163" y="835" font-size="13.5" font-weight="600" fill="#23262c">SLURM controller</text>
  <text x="1163" y="851" font-size="11" fill="#6b6f76">one per HPC site · REST via <tspan class="m" font-size="10.5">slurmrestd</tspan> ·</text>
  <text x="1163" y="867" font-size="11" fill="#6b6f76">shared by both SLURM connectors</text>

  
  <rect x="332" y="1110" width="486" height="196" rx="11" fill="#fff" stroke="#9298a0" stroke-width="1.5"></rect>
  <text x="346" y="1133" font-size="14" font-weight="600" fill="#23262c">Core schema</text>
  <text class="m" x="804" y="1133" font-size="10" fill="#7a7f86" text-anchor="end">schema_migrations</text>
  <rect x="346" y="1152" width="74" height="24" rx="7" fill="#f7f8fa" stroke="#d2d5da"></rect>
  <text x="383" y="1168" font-size="12" fill="#3a3e45" text-anchor="middle">Identity</text>
  <rect x="428" y="1152" width="82" height="24" rx="7" fill="#f7f8fa" stroke="#d2d5da"></rect>
  <text x="469" y="1168" font-size="12" fill="#3a3e45" text-anchor="middle">Projects</text>
  <rect x="518" y="1152" width="78" height="24" rx="7" fill="#f7f8fa" stroke="#d2d5da"></rect>
  <text x="557" y="1168" font-size="12" fill="#3a3e45" text-anchor="middle">Clusters</text>
  <rect x="604" y="1152" width="98" height="24" rx="7" fill="#f7f8fa" stroke="#d2d5da"></rect>
  <text x="653" y="1168" font-size="12" fill="#3a3e45" text-anchor="middle">Allocations</text>
  <rect x="346" y="1187" width="446" height="26" rx="7" fill="#eef3fb" stroke="#2a2d34" stroke-width="2"></rect>
  <text class="m" x="357" y="1204" font-size="11.5" font-weight="600" fill="#1c1f25">audit_events</text>
  <text x="445" y="1204" font-size="10" fill="#5b6276">central cross-cutting table · written by core + every connector</text>

  <rect x="852" y="1110" width="196" height="196" rx="11" fill="#fbf4e7" stroke="#b07d2a" stroke-width="1.5"></rect>
  <text x="865" y="1133" font-size="14" font-weight="600" fill="#23262c">AMIE schema</text>
  <text x="865" y="1152" font-size="11" fill="#8a7a55">per-connector pattern · owns its</text>
  <text x="865" y="1167" font-size="11" fill="#8a7a55">own tables and migrations</text>

  
