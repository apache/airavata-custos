server:
  port: 8084

grpc:
  server:
    port: 9095
    security:
      enabled: false
      key-store: classpath:grpc-server-keystore.p12
      key-store-password: ${KEYSTORE_PASSWORD:changeit}
      key-alias: grpc-server
      trust-store: classpath:grpc-server-truststore.p12
      trust-store-password: ${TRUSTSTORE_PASSWORD:changeit}
      client-auth: NONE

spring:
  application:
    name: custos-signer-service
  datasource:
    url: jdbc:mariadb://localhost:3306/custos_signer
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.type.preferred_enum_jdbc_type: VARCHAR
    show-sql: false
    database-platform: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_ADDRESS:http://localhost:8200}
      token: ${VAULT_TOKEN:root-token}
      kv:
        enabled: true
        backend: ssh-ca
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

signer:
  ca:
    rotation:
      period-hours: 2160
      overlap-hours: 2
  krl:
    publish-path: /var/lib/custos/krl
    refresh-interval-seconds: 300
  policy:
    defaults:
      max-ttl-seconds: 86400
      allowed-key-types: [ ed25519, rsa, ecdsa ]
  auth:
    allowed-issuers: ${ALLOWED_ISSUERS:}
    token-validation:
      enabled: true
    oidc:
      provider:
        issuer: https://CHANGE_ME
        jwks-uri: https://CHANGE_ME/protocol/openid-connect/certs
        client-id: CHANGE_ME
        timeout-seconds: 10
        verify-ssl: true
  # TODO - bring this as a tenant-level configuration which can be overridden by target clients
  validation:
    principal-validator: comanage
    comanage:
      registry-url: https://CHANGE_ME/
      api-path: /registry/co_people.json
      timeout-seconds: 10
      verify-ssl: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    level: '%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]'
  level:
    root: info
    org.apache.custos.signer: debug
    audit: info
  appender:
    audit:
      type: console
      pattern: '%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n'
