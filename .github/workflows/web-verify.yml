name: Web Verify

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-verify.yml'
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/web-verify.yml'
  workflow_dispatch:

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    # Dummy values that satisfy the env schema; nothing here talks to a
    # real identity provider or backend.
    env:
      NEXTAUTH_SECRET: ci-only-dummy-secret
      OIDC_ISSUER_URL: https://idp.invalid
      OIDC_CLIENT_ID: ci
      OIDC_CLIENT_SECRET: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build
