# Baseline scenario expectations. Packets are defined in
# mock-server.py::gen_baseline_scenario. Portal dev rows that AMIE cannot
# produce (resources, rates, usage, change requests) come from
# dev_portal_data.sql, applied after this scenario drains.
#
# request_account_create packets use ProjectID="__GRANT__<GN>" placeholders.
# The mock fills them in with the Custos UUID returned by notify_project_create.

scenario:
  name: baseline
  description: 12 hardcoded packets covering the AMIE handlers the mock can drive.
  determinism: full
  # Counts assume packets are decoded in mock-emission order. The worker is
  # single-threaded, so post-merge counts depend on this ordering.
  ordering: strict

trigger:
  endpoint: POST /test/{site}/scenarios?type=baseline
  drain_wait:
    decode_pending: "SELECT COUNT(*) FROM amie_packets WHERE status='NEW'"
    handle_pending: "SELECT COUNT(*) FROM amie_processing_events WHERE status NOT IN ('SUCCEEDED','FAILED','PERMANENTLY_FAILED')"
    timeout_seconds: 180
  preconditions:
    env:
      - name: AMIE_BASE_URL
      - name: AMIE_SITE_CODE
      - name: AMIE_API_KEY
      - name: AMIE_CLUSTER_ID
    seed:
      - table: compute_clusters
        row: { id: "${AMIE_CLUSTER_ID}", name: default-cluster }

expectations:

  packets:
    total_count: 12
    by_type_status:
      - { type: request_project_create,      status: DECODED, count: 3 }
      - { type: data_project_create,         status: DECODED, count: 1 }
      - { type: data_account_create,         status: DECODED, count: 1 }
      - { type: request_user_modify,         status: DECODED, count: 2 }
      - { type: request_person_merge,        status: DECODED, count: 1 }
      - { type: request_account_create,      status: DECODED, count: 3 }
      - { type: inform_transaction_complete, status: DECODED, count: 1 }

  tables:

    organizations:
      total_count: 1
      rows:
        - { originated_id: BASELINE, name: Baseline Org }

    users:
      # Pat is the merge survivor; Sam was MERGED into Pat.
      total_count: 5
      rows:
        - { first_name: Pat,    last_name: Madison, email: pat.madison@baseline.example.edu, status: PENDING }
        - { first_name: Sam,    last_name: Second,        email: sam.second@baseline.example.edu,        status: MERGED }
        - { first_name: Casey,  last_name: Collaborator,  email: casey.collab@baseline.example.edu,      status: PENDING }
        - { first_name: Riley,  last_name: Researcher,    email: riley.research@baseline.example.edu,    status: PENDING }
        - { first_name: Morgan, last_name: Manager,       email: morgan.manager@baseline.example.edu,    status: PENDING }

    user_identities:
      total_count: 5
      rows:
        - { source: access, external_id: bl-pi-001,
            email: pat.madison@baseline.example.edu,
            user_id: { from: "users.id where email=pat.madison@baseline.example.edu" },
            metadata: { regex: '.*"org_code":"BASELINE".*' } }
        # Sam's identity row was reassigned to Pat by the merge.
        - { source: access, external_id: bl-pi-002,
            email: sam.second@baseline.example.edu,
            user_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }

    projects:
      total_count: 2
      rows:
        # Handler uses GrantNumber as project.title, not ProjectTitle.
        - { originated_id: BL-001, title: BL-001, origination: access, status: ACTIVE,
            project_pi_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }
        # BL-002 PI was reassigned to Pat by the merge.
        - { originated_id: BL-002, title: BL-002, origination: access, status: ACTIVE,
            project_pi_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }

    compute_allocations:
      total_count: 2
      rows:
        # Supplement deltas go into compute_allocation_diffs, not into initial_su_amount.
        - { name: BL-001, status: ACTIVE, compute_cluster_id: "${AMIE_CLUSTER_ID}",
            initial_su_amount: 10000,
            start_time: "2026-01-01 00:00:00", end_time: "2026-12-31 00:00:00",
            project_id: { from: "projects.id where originated_id=BL-001" } }
        - { name: BL-002, status: ACTIVE, compute_cluster_id: "${AMIE_CLUSTER_ID}",
            initial_su_amount: 20000,
            start_time: "2026-01-01 00:00:00", end_time: "2026-12-31 00:00:00",
            project_id: { from: "projects.id where originated_id=BL-002" } }

    compute_allocation_diffs:
      total_count: 1
      rows:
        - { compute_allocation_id: { from: "compute_allocations.id where name=BL-001" },
            diff_type: SUPPLEMENT, new_su_amount: 5000, status: ACTIVE,
            description: "AMIE SUPPLEMENT of 5000 SUs" }

    amie_user_dns:
      # 3 DNs end up on the survivor; the trailing request_user_modify (delete)
      # removes "/DC=EDU/CN=patfirst", leaving 2.
      total_count: 2
      rows:
        - { dn: "/C=US/O=Baseline Org/CN=Pat First Extra",
            user_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }
        # Originally Sam's DN; reassigned to Pat by the merge.
        - { dn: "/C=US/O=Baseline Org/CN=Sam Second",
            user_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }

    compute_cluster_users:
      # PI CCUs come from request_project_create; the merge dedups Sam's against
      # Pat's. request_account_create packets add CCUs for Casey, Riley, Morgan.
      total_count: 4
      rows:
        - { compute_cluster_id: "${AMIE_CLUSTER_ID}",
            local_username: custos-pfirst,
            user_id: { from: "users.id where email=pat.madison@baseline.example.edu" } }

    compute_allocation_memberships:
      # Compute-access rows only (no role column). PI rows come from
      # request_project_create; the rest from request_account_create.
      total_count: 5

    project_memberships:
      # PI/CO_PI/ALLOCATION_MANAGER. MEMBER is derived from
      # compute_allocation_memberships and not stored here.
      #   BL-001: Pat (PI), Casey (CO_PI)
      #   BL-002: Pat (PI, post-merge), Morgan (ALLOCATION_MANAGER)
      total_count: 4
      by_role:
        PI: 2
        CO_PI: 1
        ALLOCATION_MANAGER: 1

  audit_log:
    # audit_events (source='amie') and amie_audit_extras carry the same count;
    # one row each per AMIE audit.
    total_count: 52
    by_action:
      PACKET_RECEIVED: 12     # one per packet
      CREATE_PERSON: 6        # 3 project_create + 3 account_create
      CREATE_ACCOUNT: 6       # 3 project_create + 3 account_create
      CREATE_PROJECT: 3
      CREATE_ALLOCATION: 3    # supplement-delivery still audits CREATE_ALLOCATION
      CREATE_MEMBERSHIP: 5    # 2 PIs + 3 account_create
      REPLY_SENT: 11          # everything except inform_transaction_complete
      PERSIST_DNS: 3          # 2 from data_*, 1 delete from request_user_modify
      UPDATE_PERSON: 1
      MERGE_PERSONS: 1
      TRANSACTION_COMPLETE: 1

  processing_events:
    total_count: 12
    by_status:
      SUCCEEDED: 12
    not_expected_statuses:
      - RUNNING
      - NEW
      - RETRY_SCHEDULED
      - FAILED
      - PERMANENTLY_FAILED

  not_expected:
    - amie_processing_errors

# ---------------------------------------------------------------------------
# Seed rows from dev_portal_data.sql, applied after baseline drains. These
# tables aren't reachable from AMIE handlers; the seed exists so portal pages
# render meaningful content. Counts are lower bounds.
# ---------------------------------------------------------------------------

seed_rows:

  compute_allocation_resources:
    minimum_count: 2        # CPU + GPU, cluster-scoped
    rows:
      - { id: res-cpu, name: "CPU Service Units", resource_type: CPU_HOURS,
          compute_cluster_id: "${AMIE_CLUSTER_ID}" }
      - { id: res-gpu, name: "GPU Service Units", resource_type: GPU_HOURS,
          compute_cluster_id: "${AMIE_CLUSTER_ID}" }

  compute_allocation_resource_mappings:
    minimum_count: 3        # CPU on both allocations, GPU on BL-001
    rows:
      - { compute_allocation_id: { from: "compute_allocations.id where name=BL-001" },
          compute_allocation_resource_id: res-cpu, resource_amount: 10000 }
      - { compute_allocation_id: { from: "compute_allocations.id where name=BL-002" },
          compute_allocation_resource_id: res-cpu, resource_amount: 10000 }
      - { compute_allocation_id: { from: "compute_allocations.id where name=BL-001" },
          compute_allocation_resource_id: res-gpu, resource_amount: 200 }

  compute_allocation_resource_rates:
    minimum_count: 2
    rows:
      - { id: rate-cpu, compute_allocation_resource_id: res-cpu, rate: 1.0 }
      - { id: rate-gpu, compute_allocation_resource_id: res-gpu, rate: 10.0 }

  compute_allocation_usages:
    minimum_count: 2        # one sample job per baseline allocation
    rows:
      - { compute_allocation_id: { from: "compute_allocations.id where name=BL-001" },
          used_su_amount: 250.5, compute_allocation_resource_id: res-cpu }
      - { compute_allocation_id: { from: "compute_allocations.id where name=BL-002" },
          used_su_amount: 250.5, compute_allocation_resource_id: res-cpu }

  compute_allocation_change_requests:
    minimum_count: 1        # one PENDING request on BL-001
    rows:
      - { id: chreq-bl001, change_status: PENDING, requested_su_amount: 25000,
          requested_status: ACTIVE,
          compute_allocation_id: { from: "compute_allocations.id where name=BL-001" },
          requester_id: dev-researcher }

  compute_allocation_change_request_events:
    minimum_count: 2        # CREATED + COMMENTED
    rows:
      - { compute_allocation_change_request_id: chreq-bl001, event_type: CREATED }
      - { compute_allocation_change_request_id: chreq-bl001, event_type: COMMENTED }

  compute_allocation_membership_resource_overrides:
    minimum_count: 1
    rows:
      - { compute_allocation_resource_id: res-gpu, override_resource_amount: 50,
          compute_allocation_membership_id: { from: "compute_allocation_memberships.id where compute_allocation_id=(compute_allocations.id where name=BL-001)" } }

  user_privileges:
    minimum_count: 8        # dev-admin gets all portal privileges via seed
    rows:
      - { user_id: dev-admin, privilege: "amie:packets:read" }
      - { user_id: dev-admin, privilege: "amie:packets:write" }
      - { user_id: dev-admin, privilege: "amie:replies:read" }
      - { user_id: dev-admin, privilege: "amie:replies:write" }
      - { user_id: dev-admin, privilege: "amie:unmapped:read" }
      - { user_id: dev-admin, privilege: "amie:unmapped:write" }
      - { user_id: dev-admin, privilege: "core:clusters:read" }
      - { user_id: dev-admin, privilege: "core:clusters:write" }

verification_queries:

  - name: packet status by type
    sql: |
      SELECT type, status, COUNT(*) AS n FROM amie_packets
      GROUP BY type, status ORDER BY type;
    expect: see expectations.packets.by_type_status

  - name: zero errors
    sql: SELECT COUNT(*) FROM amie_processing_errors;
    expect: 0

  - name: survivor + retiring user state
    sql: SELECT email, status FROM users ORDER BY email;
    expect: |
      pat.madison@baseline.example.edu, ACTIVE
      sam.second@baseline.example.edu,        MERGED

  - name: supplement recorded as diff (not new allocation)
    sql: |
      SELECT (SELECT COUNT(*) FROM compute_allocations) AS allocs,
             (SELECT COUNT(*) FROM compute_allocation_diffs) AS diffs,
             (SELECT diff_type FROM compute_allocation_diffs) AS diff_type,
             (SELECT new_su_amount FROM compute_allocation_diffs) AS supp_su;
    expect: allocs=2, diffs=1, diff_type=SUPPLEMENT, supp_su=5000

  - name: merge consolidated identity-forward state to survivor
    sql: |
      SELECT 'user_identities' AS t, COUNT(*) AS n_on_survivor FROM user_identities WHERE user_id = (SELECT id FROM users WHERE email='pat.madison@baseline.example.edu')
      UNION ALL
      SELECT 'amie_user_dns',   COUNT(*)                       FROM amie_user_dns   WHERE user_id = (SELECT id FROM users WHERE email='pat.madison@baseline.example.edu')
      UNION ALL
      SELECT 'projects_as_pi',  COUNT(*)                       FROM projects        WHERE project_pi_id = (SELECT id FROM users WHERE email='pat.madison@baseline.example.edu');
    expect: user_identities=2, amie_user_dns=2, projects_as_pi=2

  - name: merge recorded in audit log
    sql: |
      SELECT event_type, entity_type, entity_id, details
      FROM audit_events
      WHERE source = 'amie' AND event_type = 'MERGE_PERSONS';
    expect:
      one row, entity_type=user, details contains "merged <retiring_id> into <survivor_id>: <reason>"

  - name: audit action counts
    sql: |
      SELECT event_type, COUNT(*) AS n
      FROM audit_events
      WHERE source = 'amie'
      GROUP BY event_type
      ORDER BY event_type;
    expect: see expectations.audit_log.by_action
